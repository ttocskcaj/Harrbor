services:
  harrbor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harrbor
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Harrbor__PollingInterval=00:01:00
      - Harrbor__TransferParallelism=2
      - Harrbor__DataPath=/app/data
      - QBittorrent__BaseUrl=${QBITTORRENT_URL:-http://qbittorrent:8080}
      - QBittorrent__Username=${QBITTORRENT_USERNAME:-admin}
      - QBittorrent__Password=${QBITTORRENT_PASSWORD}
      - Sonarr__BaseUrl=${SONARR_URL:-http://sonarr:8989}
      - Sonarr__ApiKey=${SONARR_API_KEY}
      - Sonarr__Enabled=${SONARR_ENABLED:-true}
      - Sonarr__RemotePath=${SONARR_REMOTE_PATH:-/downloads/tv}
      - Sonarr__StagingPath=${SONARR_STAGING_PATH:-/staging/tv}
      - Sonarr__ArchivePath=${SONARR_ARCHIVE_PATH:-/archive/tv}
      - Radarr__BaseUrl=${RADARR_URL:-http://radarr:7878}
      - Radarr__ApiKey=${RADARR_API_KEY}
      - Radarr__Enabled=${RADARR_ENABLED:-true}
      - Radarr__RemotePath=${RADARR_REMOTE_PATH:-/downloads/movies}
      - Radarr__StagingPath=${RADARR_STAGING_PATH:-/staging/movies}
      - Radarr__ArchivePath=${RADARR_ARCHIVE_PATH:-/archive/movies}
    volumes:
      - harrbor-data:/app/data
      - harrbor-logs:/app/logs
      - ./staging:/app/staging
      - ${RCLONE_CONFIG:-~/.config/rclone/rclone.conf}:/home/harrbor/.config/rclone/rclone.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  harrbor-data:
  harrbor-logs:
